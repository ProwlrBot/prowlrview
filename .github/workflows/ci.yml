name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go vet ./...
      - run: go test -race -cover ./...
      - run: go build -o bin/prowlrview ./cmd/prowlrview
      - uses: actions/upload-artifact@v4
        with:
          name: prowlrview-linux-amd64
          path: bin/prowlrview
